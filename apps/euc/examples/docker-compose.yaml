services:
  euc:
    image: ghcr.io/ryandraves/euc:latest
    restart: always
    # Share the tailscale sidecar's network namespace so `tailscale serve` reaches
    # the server on 127.0.0.1:8080 (EUC_PORT, baked into the image).
    network_mode: service:tailscale
    secrets:
      - euc_password
      - euc_token_secret
    environment:
      EUC_SITE_PASSWORD_FILE: /run/secrets/euc_password
      EUC_TOKEN_SECRET_FILE: /run/secrets/euc_token_secret
    depends_on:
      tailscale:
        condition: service_started

  tailscale:
    image: tailscale/tailscale:v1.98.4
    hostname: euc
    secrets:
      - euc_authkey
    environment:
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/ts-serve.json
      TS_AUTHKEY: file:/run/secrets/euc_authkey
    volumes:
      - euc-ts-authkey:/var/lib/tailscale
      # Use a directory so `fsnotify` can watch the config file for changes
      - ${PWD}/ts-serve:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    restart: unless-stopped

volumes:
  euc-ts-authkey:

secrets:
  euc_authkey:
    file: ${PWD}/euc.authkey
  euc_password:
    file: ${PWD}/euc.password
  euc_token_secret:
    file: ${PWD}/euc.token_secret
