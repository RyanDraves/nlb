services:
  spirit-tracks:
    image: ghcr.io/ryandraves/spirit_tracks:latest
    network_mode: service:tailscale
    environment:
      SPIRIT_TRACKS_CONFIG: /config/secrets.json
      SPIRIT_TRACKS_SETEC_ADDR: https://setec.barn-arcturus.ts.net
    volumes:
      - dash-secrets:/secrets/dash
      - ${PWD}/secrets.json:/config/secrets.json:ro
    restart: "no"

  homer:
    image: b4bz/homer:latest
    network_mode: service:tailscale
    volumes:
      - ${PWD}/config:/home/lighttpd
      - dash-secrets:/secrets:ro
    deploy:
      restart_policy:
        condition: on-failure
    entrypoint: '/home/lighttpd/entrypoint.sh'
    depends_on:
      spirit-tracks:
        condition: service_completed_successfully

  tailscale:
    image: tailscale/tailscale:v1.94.2
    hostname: dash
    secrets:
      - dash_authkey
    environment:
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/ts-serve.json
      TS_AUTHKEY: file:/run/secrets/dash_authkey
    volumes:
      - dash-ts-authkey:/var/lib/tailscale
      # Use a directory so `fsnotify` can watch the config file for changes
      - ${PWD}/ts-serve:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    restart: unless-stopped

volumes:
  dash-ts-authkey:
  dash-secrets:

secrets:
  dash_authkey:
    file: ${PWD}/../secrets/dash.authkey
