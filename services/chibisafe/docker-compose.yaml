services:
  chibisafe:
    image: chibisafe/chibisafe:latest
    environment:
      - BASE_API_URL=http://chibisafe_server:8000
    restart: unless-stopped

  chibisafe_server:
    image: chibisafe/chibisafe-server:latest
    volumes:
      - chibisafe-database:/app/database:rw
      - chibisafe-uploads:/app/uploads:rw
      - chibisafe-logs:/app/logs:rw
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    network_mode: service:tailscale
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - chibisafe-uploads:/app/uploads:ro
    environment:
      - BASE_URL=":8080"
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:v1.90.8
    hostname: files
    secrets:
      - chibisafe_authkey
    environment:
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/ts-serve.json
      TS_AUTHKEY: file:/run/secrets/chibisafe_authkey
    volumes:
      - chibisafe-ts-authkey:/var/lib/tailscale
      # Use a directory so `fsnotify` can watch the config file for changes
      - ${PWD}/ts-serve:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    restart: unless-stopped

volumes:
  chibisafe-ts-authkey:
  chibisafe-uploads:
  chibisafe-logs:
  chibisafe-database:


secrets:
  chibisafe_authkey:
    file: ${PWD}/../secrets/chibisafe.authkey
