services:
  chibisafe:
    image: chibisafe/chibisafe:latest
    environment:
      - BASE_API_URL=http://chibisafe_server:8000
    restart: unless-stopped

  chibisafe_server:
    image: chibisafe/chibisafe-server:latest
    volumes:
      - images-database:/app/database:rw
      - images-uploads:/app/uploads:rw
      - images-logs:/app/logs:rw
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    network_mode: service:tailscale
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - images-uploads:/app/uploads:ro
    environment:
      - BASE_URL=":8080"
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:v1.94.2
    hostname: images
    secrets:
      - images_authkey
    environment:
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/ts-serve.json
      TS_AUTHKEY: file:/run/secrets/images_authkey
    volumes:
      - images-ts-authkey:/var/lib/tailscale
      # Use a directory so `fsnotify` can watch the config file for changes
      - ${PWD}/ts-serve:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    restart: unless-stopped

volumes:
  images-ts-authkey:
  images-uploads:
  images-logs:
  images-database:


secrets:
  images_authkey:
    file: ${PWD}/../secrets/images.authkey
