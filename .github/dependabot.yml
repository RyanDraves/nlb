version: 2
updates:
  # open-pull-requests-limit: 0 disables version-update PRs for each ecosystem
  # (Renovate handles those). Security-fix PRs bypass this limit and are still
  # raised automatically when a CVE is found in a pinned dependency.

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: docker
    directory: /nlb/env
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
